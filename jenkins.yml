---

apiVersion: v1
kind: Namespace
metadata:
  name: jenkins

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: jenkins
  namespace: jenkins

spec:
  replicas: 1

  selector:
    matchLabels:
      app: jenkins

  template:
    metadata:
      labels:
        app: jenkins

    spec:
      containers:
        - name: jenkins
          image: jenkins/jenkins:lts

          ports:
            - name: httpport
              containerPort: 8080

            - name: jnlpport
              containerPort: 50000

          volumeMounts:
            - name: jenkins-storage
              mountPath: /var/jenkins_home

      volumes:
        - name: jenkins-storage
          emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: jenkins

spec:
  type: NodePort

  selector:
    app: jenkins

  ports:
    - name: jenkins
      port: 8080
      targetPort: 8080
      nodePort: 30222
