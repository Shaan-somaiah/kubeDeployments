---

apiVersion: v1
kind: Namespace
metadata:
  name: postgres

---

apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: postgres
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: testdb

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: postgres

spec:
  replicas: 1

  selector:
    matchLabels:
      app: postgres

  template:
    metadata:
      labels:
        app: postgres

    spec:
      containers:
        - name: postgres
          image: postgres:18

          ports:
            - containerPort: 5432

          envFrom:
            - secretRef:
                name: postgres-secret

          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/

      volumes:
        - name: postgres-storage
          emptyDir: {}

---

apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: postgres

spec:
  type: NodePort

  selector:
    app: postgres

  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      nodePort: 30111

